# About Section
about_title: About Me
about_profile_image: images/profile.jpg
about_content: | # this will include new lines to allow paragraphs
  I am an undergraduate at the Kwame Nkrumah University of Science and Technology studying [Telecom Engineering](https://teleng.knust.edu.gh/) in the [Faculty of Electrical and Computer Engineering](https://coe.knust.edu.gh/faculties/faculty-electrical-computer-engineering) under the mentorship of [Dr. Francisca Adoma Acheampong](https://webapps.knust.edu.gh/staff/dirsearch/profile/summary/fb34c7d09958.html). 
  
  I have interests in Machine Learning and Quant Finance, focusing on the application of machine learning techniques for problem-solving. Furthermore, I have experience in applying mathematical modeling to predict market capitalization and identify arbitrage betting opportunities. [ResearchGate](https://www.researchgate.net/profile/Benjamin-Attabra/research)

content:
  - title: Projects # Title for the section
    layout: cards # Type of content section (list/text/cards)
    content:
      - layout: top-middle
        border: weak
        title: Sequential Deep Learning for Credit Risk Modelling
        link_text: https://github.com/attabeezy/seqcredit-model
        quote: >
          Cause if you ain't doing what you love it's only you to blame
        description: |
          Credit-risk prediction built around temporal feature engineering and sequential deep learning on mobile money transaction histories (per-user sequences). Includes multiple baseline and sequence models — LR, XGBoost, RF, LightGBM, LSTM, and Hybrid LSTM — with tooling for 5-fold CV benchmarking, feature ablations, and hyperparameter tuning. Focused on financial inclusion in data-constrained environments.
      - layout: top-middle
        border: weak
        title: EdgeTutor
        link_text: https://github.com/attabeezy/edge-tutor
        quote: >
          Call my unborn son and tell him that's the mission
        description: |
          Offline, on-device RAG tutoring assistant for Android, built for first-year engineering students at KNUST to query textbooks without internet. Supports PDF/TXT ingestion and retrieval locally, designed to run on ~1 GB RAM devices using lightweight/quantized models (Gemma-3-270M) and an ONNX embedder pipeline. Ships as both a Python MVP prototype and a full Android app in Kotlin/Jetpack Compose.
      - layout: top-middle
        border: weak
        title: PaperGo
        link_text: https://github.com/attabeezy/papergo
        quote: >
          Keep running, keep searching
        description: |
          Academic paper aggregator pulling from arXiv, Semantic Scholar, and OpenReview. Streamlines the research process by centralizing access to the latest publications in one place.
      - layout: top-middle
        border: weak
        title: Akan-BPE
        link_text: https://github.com/attabeezy/akan-bpe
        description: |
          * Developed a research framework to mitigate the "Tokenization Tax" for the Akan language, addressing the efficiency gap in LLMs for low-resource African languages.
          * Engineered and benchmarked specialized Byte Pair Encoding (BPE) tokenizers using Python and Hugging Face, comparing performance across conversational (ASR) and formal (TTS) text regimes.
          * Optimized Token Fertility (tokens-per-word ratio), significantly reducing sequence lengths compared to standard baselines (e.g., GPT-2/Llama) to lower inference latency and API costs.
          * Built automated data pipelines for normalizing multi-source datasets (Google WaxalNLP, Ghana NLP) and a unified benchmarking suite for empirical tokenizer evaluation.

  - title: Papers # Title for the section
    layout: list # Type of content section (list/text)
    content:
      - layout: left
        title: "2026"
        description: |
            **Benjamin Ekow Attabra** (2026). [A tourist guide to ethical artificial intelligence usage](https://ieeexplore.ieee.org/document/11410581). Take this as your tourist guide to the landscape and terrains of ethical AI usage. As AI systems subtly thread themselves into our daily lives, they carry not only impressive capabilities and convenience but also adverse effects. From deciding who is going to get a loan to identifying faces in public domains, AI systems increasingly influence our world and not always for the better. Ethical navigation is about managing those tradeoffs thoughtfully and responsibly.

      - layout: left
        title: "2023"
        description: |
            **Benjamin Ekow Attabra** (2023). [Market Capitalization Forecasting with Annuity Due Models](https://www.researchgate.net/publication/387671507_Market_Capitalization_Forecasting_with_Annuity_Due_Models). This paper presents a mathematical model for estimating the future market capitalization of public companies by adapting the future value of annuity due formula. Using principles from geometric series and compound interest, we demonstrate how this model can provide structured forecasts for company valuations, providing a systematic approach based on established financial mathematics principles.

      - layout: left
        title: ""
        description: |
            **Benjamin Ekow Attabra** (2023). [Mathematical Analysis of Multi-Outcome Sports Betting Arbitrage: A System of Equations Approach](https://www.researchgate.net/publication/387671984_Mathematical_Analysis_of_Multi-Outcome_Sports_Betting_Arbitrage_A_System_of_Equations_Approach). This paper introduces a mathematical framework for identifying arbitrage opportunities in three-outcome sports betting markets. By utilizing systems of simultaneous equations, we develop a method for optimal stake allocation across bookmakers.

