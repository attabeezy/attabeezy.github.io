about_content: | # this will include new lines to allow paragraphs
  I am an undergraduate at the Kwame Nkrumah University of Science and Technology studying [Telecom Engineering](https://teleng.knust.edu.gh/) in the [Faculty of Electrical and Computer Engineering](https://coe.knust.edu.gh/faculties/faculty-electrical-computer-engineering) under the mentorship of [Dr. Francisca Adoma Acheampong](https://webapps.knust.edu.gh/staff/dirsearch/profile/summary/fb34c7d09958.html). 
  
  I have interests in Machine Learning and Quant Finance, focusing on the application of machine learning techniques for problem-solving. Furthermore, I have experience in applying mathematical modeling to predict market capitalization and identify arbitrage betting opportunities. [ResearchGate](https://www.researchgate.net/profile/Benjamin-Attabra/research)

